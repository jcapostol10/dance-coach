name: dance_coach
description: "DanceCoach AI — Learn any dance, one beat at a time."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera & Video
  camera: ^0.11.0+2
  video_player: ^2.9.2

  # Audio with speed control
  just_audio: ^0.9.42

  # Pose estimation
  google_mlkit_pose_detection: ^0.12.0

  # Auth
  google_sign_in: ^6.2.1

  # File picker
  image_picker: ^1.1.2

  # Networking
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # Local storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5

  # Routing
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
